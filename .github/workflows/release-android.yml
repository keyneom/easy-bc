name: Release Android APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v7

      - name: Verify Gradle wrapper integrity
        run: bash scripts/verify-gradle-wrapper.sh

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Validate release version
        shell: bash
        run: |
          set -euo pipefail
          version_name="$(sed -n 's/^[[:space:]]*versionName = "\([^"]*\)"/\1/p' android/app/build.gradle.kts)"
          test -n "$version_name"
          if [[ "v$version_name" != "$GITHUB_REF_NAME" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match Android version v$version_name" >&2
            exit 1
          fi

      - name: Install Rust Android build tools
        shell: bash
        run: |
          set -euo pipefail
          rustup show active-toolchain
          cargo install cargo-ndk --version 4.1.2 --locked

      - name: Build native planner from source
        shell: bash
        run: |
          set -euo pipefail
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "ndk;27.0.12077973"
          export ANDROID_NDK_HOME="$ANDROID_SDK_ROOT/ndk/27.0.12077973"
          ./scripts/android-build-native.sh

      - name: Restore signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          keystore_file="$RUNNER_TEMP/easy-bc-release.jks"
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_file"
          chmod 600 "$keystore_file"
          printf 'ANDROID_KEYSTORE_FILE=%s\n' "$keystore_file" >> "$GITHUB_ENV"

      - name: Build signed release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew --no-daemon assembleRelease

      - name: Verify and package APK
        shell: bash
        run: |
          set -euo pipefail
          source_apk="android/app/build/outputs/apk/release/app-release.apk"
          release_apk="easy-bc-${GITHUB_REF_NAME}-arm64.apk"
          test -f "$source_apk"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$source_apk"
          cp "$source_apk" "$release_apk"
          sha256sum "$release_apk" > "$release_apk.sha256"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "easy-bc-${GITHUB_REF_NAME}-arm64.apk" \
            "easy-bc-${GITHUB_REF_NAME}-arm64.apk.sha256" \
            --generate-notes \
            --title "EasyBC $GITHUB_REF_NAME" \
            --verify-tag
